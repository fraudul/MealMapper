<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MealMapper — Где поесть в Минске</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
<div class="max-w-2xl mx-auto p-6">
    <h1 class="text-4xl font-bold text-center mb-8 text-emerald-600">🍽️ MealMapper</h1>
    <p class="text-center text-gray-600 mb-10">Умный помощник по выбору еды в Минске</p>

    <form id="form" class="bg-white shadow-xl rounded-2xl p-8 space-y-6">
        <!-- Геопозиция -->
        <div>
            <label class="block text-sm font-medium mb-1">📍 Твоя позиция (Минск)</label>
            <div class="grid grid-cols-2 gap-4">
                <input id="lat" type="number" step="0.000001" value="53.9023" placeholder="Широта"
                       class="w-full px-4 py-3 border rounded-xl focus:outline-none focus:border-emerald-500">
                <input id="lon" type="number" step="0.000001" value="27.5620" placeholder="Долгота"
                       class="w-full px-4 py-3 border rounded-xl focus:outline-none focus:border-emerald-500">
            </div>
        </div>

        <!-- Бюджет -->
        <div>
            <label class="block text-sm font-medium mb-2">💰 Бюджет (BYN)</label>
            <div class="flex gap-4">
                <input id="budgetMin" type="number" value="15" class="flex-1 px-4 py-3 border rounded-xl">
                <span class="self-center text-gray-400">—</span>
                <input id="budgetMax" type="number" value="45" class="flex-1 px-4 py-3 border rounded-xl">
            </div>
        </div>

        <!-- Предпочтения -->
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium mb-2">Что хочешь?</label>
                <select id="actionType" class="w-full px-4 py-3 border rounded-xl">
                    <option value="EatOut">Съесть на месте</option>
                    <option value="OrderDelivery">Заказать доставку</option>
                    <option value="CookAtHome">Приготовить дома</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium mb-2">Фастфуд?</label>
                <div class="flex items-center gap-3 mt-3">
                    <input id="fastFood" type="checkbox" checked class="w-5 h-5 accent-emerald-600">
                    <span class="text-sm">Разрешён</span>
                </div>
            </div>
        </div>

        <button type="submit"
                class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-4 rounded-2xl text-lg transition-all flex items-center justify-center gap-2">
            <i class="fas fa-magic"></i>
            Найти 3 лучших варианта
        </button>
    </form>

    <!-- Результаты -->
    <div id="results" class="mt-8 hidden"></div>
</div>

<script>
    const form = document.getElementById('form');
    const resultsDiv = document.getElementById('results');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        resultsDiv.innerHTML = '<p class="text-center text-gray-500">Анализируем карту и твои пожелания...</p>';
        resultsDiv.classList.remove('hidden');

        const command = {
            latitude: parseFloat(document.getElementById('lat').value),
            longitude: parseFloat(document.getElementById('lon').value),
            budgetMin: parseFloat(document.getElementById('budgetMin').value),
            budgetMax: parseFloat(document.getElementById('budgetMax').value),
            actionType: document.getElementById('actionType').value,
            isFastFoodAllowed: document.getElementById('fastFood').checked,
            distancePref: "Medium",           // пока хардкод, потом добавим
            cuisinePreference: null,
            onlyNearby: false
        };

        try {
            const response = await fetch('/api/recommendations/session', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(command)
            });

            const data = await response.json();

            if (response.ok) {
                let html = `<h2 class="text-2xl font-semibold mb-6">🎯 Твои 3 варианта</h2>`;
                data.recommendations.forEach(r => {
                    html += `
                            <div class="bg-white border border-emerald-200 rounded-2xl p-6 mb-4 flex gap-4">
                                <div class="flex-1">
                                    <div class="font-semibold text-lg">${r.name}</div>
                                    <div class="text-emerald-600">${r.description}</div>
                                    <div class="text-sm text-gray-500 mt-2">${r.score * 100}% совпадение</div>
                                </div>
                                <button onclick="approve('${r.id}')" 
                                        class="px-8 bg-emerald-600 text-white rounded-2xl hover:bg-emerald-700 text-sm font-medium">
                                    Выбрать
                                </button>
                            </div>`;
                });
                resultsDiv.innerHTML = html;
            } else {
                resultsDiv.innerHTML = `<div class="text-red-600">Ошибка: ${data.message}</div>`;
            }
        } catch (err) {
            resultsDiv.innerHTML = `<div class="text-red-600">Не удалось связаться с сервером</div>`;
        }
    });

    function approve(id) {
        alert(`✅ Выбрал вариант ${id}!\n\n(здесь позже будет маршрут или рецепт)`);
    }
</script>
</body>
</html>
