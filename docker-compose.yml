services:
  web-api:
    build:
      context: .
      dockerfile: src/Web.Api/Dockerfile
      args:
        BUILD_CONFIGURATION: Release
    dns:
      - 8.8.8.8
      - 8.8.4.4
    container_name: web-api
    ports:
      - "5000:8080"
      - "5001:8081"
    environment:
      - ConnectionStrings__Database=Host=postgres;Port=5432;Database=mealmapper;Username=postgres;Password=postgres;Include Error Detail=true
      - ASPNETCORE_URLS=http://0.0.0.0:8080
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      postgres:
        condition: service_healthy
    # volumes для DataProtection можно оставить (named volume), но пока не обязательно
    # volumes:
    #   - dataprotection_keys:/home/app/.aspnet/DataProtection-Keys

  postgres:
    image: postgres:17
    container_name: postgres
    environment:
      - POSTGRES_DB=mealmapper
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  seq:
    image: datalust/seq:2024.3
    container_name: seq
    environment:
      - ACCEPT_EULA=Y
    ports:
      - "8081:80"

volumes:
  postgres_data:
  # dataprotection_keys:   # раскомментируй только если будешь использовать DataProtection